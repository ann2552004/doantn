<text x="750.0" y="42" text-anchor="middle" style="font-family:DejaVu Sans, Arial, sans-serif;font-size:25px;font-weight:700;fill:#111;"><tspan x="750.0" dy="0">Hình 2.37. Sơ đồ đo tốc độ phương tiện qua hai vạch</tspan></text><line x1="80" y1="68" x2="1420" y2="68" stroke="#444" stroke-width="1" fill="none"/><rect x="150" y="120" width="1200" height="760" rx="4" fill="#fafafa" stroke="#111" stroke-width="2"/><text x="750.0" y="492.3" text-anchor="middle" style="font-family:DejaVu Sans, Arial, sans-serif;font-size:22px;font-weight:700;fill:#111;"><tspan x="750.0" dy="0">Khung video camera</tspan></text><polygon points="520,190 980,190 1200,820 300,820" fill="#f2f2f2" stroke="#111" stroke-width="3"/><line x1="390" y1="360" x2="1110" y2="360" stroke="#111" stroke-width="4" fill="none"/><text x="1130" y="366" text-anchor="start" style="font-family:DejaVu Sans, Arial, sans-serif;font-size:20px;font-weight:400;fill:#111;"><tspan x="1130" dy="0">Vạch A - bắt đầu đo</tspan></text><line x1="325" y1="660" x2="1180" y2="660" stroke="#111" stroke-width="4" fill="none"/><text x="1200" y="666" text-anchor="start" style="font-family:DejaVu Sans, Arial, sans-serif;font-size:20px;font-weight:400;fill:#111;"><tspan x="1200" dy="0">Vạch B - kết thúc đo</tspan></text><line x1="740" y1="330" x2="805" y2="620" stroke="#111" stroke-width="4" fill="none" marker-end="url(#arrow)"/><rect x="700" y="290" width="100" height="55" rx="12" fill="#fff" stroke="#111" stroke-width="2"/><text x="750.0" y="310.5" text-anchor="middle" style="font-family:DejaVu Sans, Arial, sans-serif;font-size:20px;font-weight:400;fill:#111;"><tspan x="750.0" dy="0">Xe</tspan></text><rect x="760" y="590" width="100" height="55" rx="12" fill="#fff" stroke="#111" stroke-width="2"/><text x="810.0" y="610.5" text-anchor="middle" style="font-family:DejaVu Sans, Arial, sans-serif;font-size:20px;font-weight:400;fill:#111;"><tspan x="810.0" dy="0">Xe</tspan></text><text x="620" y="510" text-anchor="middle" style="font-family:DejaVu Sans, Arial, sans-serif;font-size:24px;font-weight:700;fill:#111;"><tspan x="620" dy="0">Khoảng cách A-B = d</tspan></text><rect x="170" y="760" width="430" height="80" rx="8" fill="#fff" stroke="#111" stroke-width="2"/><text x="385.0" y="791.6" text-anchor="middle" style="font-family:DejaVu Sans, Arial, sans-serif;font-size:24px;font-weight:700;fill:#111;"><tspan x="385.0" dy="0">Tốc độ = d / (t2 - t1)</tspan></text><text x="170" y="710" text-anchor="start" style="font-family:DejaVu Sans, Arial, sans-serif;font-size:20px;font-weight:400;fill:#111;"><tspan x="170" dy="0">t1: thời điểm xe qua vạch A</tspan><tspan x="170" dy="25.0">t2: thời điểm xe qua vạch B</tspan></text>
